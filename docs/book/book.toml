[book]
title = "RustVault User Guide"
authors = ["RustVault Contributors"]
description = "Self-hosted personal finance platform — user documentation"
language = "en"
src = "src"

[build]
build-dir = "../../target/book"

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Xsarius/RustVault"
edit-url-template = "https://github.com/Xsarius/RustVault/edit/main/docs/book/src/{path}"
additional-css = []
additional-js = []

[output.html.search]
enable = true
limit-results = 20

[output.html.playground]
editable = false
