# Default RustVault configuration
# Override specific settings via environment variables.

[server]
port = 8080
allowed_origins = []
request_timeout_secs = 30
max_body_size = "10MB"
max_upload_size = "50MB"

[database]
max_connections = 10
min_connections = 2
acquire_timeout_secs = 5
idle_timeout_secs = 300
max_lifetime_secs = 1800

[auth]
allow_new_user_register = true
access_token_ttl_secs = 900
refresh_token_ttl_secs = 604800
max_sessions_per_user = 10
password_min_length = 10
password_max_length = 128
login_rate_limit_attempts = 5
login_rate_limit_window_secs = 900
account_lockout_threshold = 20
audit_retention_days = 90

[auth.oidc]
enabled = false
display_name = "SSO"
scopes = ["openid", "profile", "email"]
auto_register = true

[import]
max_file_size = "50MB"
allowed_extensions = ["csv", "mt940", "sta", "ofx", "qfx", "qif", "xml", "xlsx", "xls", "ods", "json"]

[ai]
enabled = false
